spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          routes:
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/users/**, /oauth2/jwks

            - id: listing-service
              uri: lb://listing-service
              predicates:
                - Path=/api/listings/**

#            - id: booking-service
#              uri: lb://booking-service
#              predicates:
#                - Path=/api/bookings/**
server:
  port: 8080
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE}
